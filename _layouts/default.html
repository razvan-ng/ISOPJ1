<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: 'Press Start 2P', cursive;
      margin: 0;
      padding: 0;
      overflow: hidden; /* evitar scroll pel moviment */
    }

    header {
      text-align: center;
      padding: 30px 10px;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    p.subtitle {
      font-size: 12px;
      color: #aaa;
    }

    .container {
      max-width: 900px;
      margin: 20px auto;
      padding: 20px;
      text-align: left;
      position: relative;
      z-index: 2;
    }

    .content {
      background: rgba(0,0,0,0.7);
      border-radius: 12px;
      padding: 20px;
    }

    /* Botó música */
    .music-control {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #ff0066;
      color: #fff;
      font-family: 'Press Start 2P', cursive;
      font-size: 12px;
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      z-index: 3;
      box-shadow: 0 4px 6px rgba(0,0,0,0.4);
      transition: transform 0.2s;
    }

    .music-control:hover {
      transform: scale(1.1);
      background: #ff3385;
    }

    /* Estil comú pels Ricardos */
    .dancer {
      position: absolute;
      width: 180px;
      height: auto;
      image-rendering: pixelated;
      z-index: 1;
      animation: dance 0.6s infinite alternate;
    }

    /* Animacions independents */
    .d1 {
      top: 5%;
      left: 5%;
      animation: move1 18s linear infinite alternate,
                 dance 0.6s infinite alternate;
    }
    .d2 {
      top: 60%;
      left: 10%;
      animation: move2 22s linear infinite alternate,
                 dance 0.6s infinite alternate;
    }
    .d3 {
      top: 20%;
      left: 70%;
      animation: move3 20s linear infinite alternate,
                 dance 0.6s infinite alternate;
    }
    .d4 {
      top: 75%;
      left: 50%;
      animation: move4 25s linear infinite alternate,
                 dance 0.6s infinite alternate;
    }
    .d5 {
      top: 40%;
      left: 30%;
      animation: move5 30s linear infinite alternate,
                 dance 0.6s infinite alternate;
    }

    /* Keyframes amb recorreguts variats */
    @keyframes move1 {
      from { transform: translate(0, 0) rotate(-5deg) scale(1); }
      to   { transform: translate(400px, 300px) rotate(5deg) scale(1.05); }
    }
    @keyframes move2 {
      from { transform: translate(0, 0) rotate(5deg) scale(1); }
      to   { transform: translate(500px, -200px) rotate(-5deg) scale(1.05); }
    }
    @keyframes move3 {
      from { transform: translate(0, 0) rotate(-5deg) scale(1); }
      to   { transform: translate(-450px, 250px) rotate(5deg) scale(1.05); }
    }
    @keyframes move4 {
      from { transform: translate(0, 0) rotate(5deg) scale(1); }
      to   { transform: translate(300px, -300px) rotate(-5deg) scale(1.05); }
    }
    @keyframes move5 {
      from { transform: translate(0, 0) rotate(-5deg) scale(1); }
      to   { transform: translate(-350px, -250px) rotate(5deg) scale(1.05); }
    }

    @keyframes dance {
      from { transform: scale(1) rotate(-5deg); }
      to   { transform: scale(1.05) rotate(5deg); }
    }

    nav ul {
      list-style: none;
      padding: 0;
      margin: 30px 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    nav ul li {
      background: #222;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.5);
      transition: transform 0.2s;
    }

    nav ul li:hover {
      transform: scale(1.05);
      background: #333;
    }

    nav ul li a {
      color: #fff;
      text-decoration: none;
      font-size: 12px;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 10px;
      color: #888;
      position: relative;
      z-index: 2;
    }
  </style>
</head>
<body>
  <header>
    <h1>{{ page.title | default: site.title }}</h1>
    {% if page.subtitle %}
      <p class="subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </header>

  <!-- 5 Ricardos escampats -->
  <img src="{{ '/assetscss/ricardo.gif' | relative_url }}" alt="Ricardo 1" class="dancer d1">
  <img src="{{ '/assetscss/ricardo.gif' | relative_url }}" alt="Ricardo 2" class="dancer d2">
  <img src="{{ '/assetscss/ricardo.gif' | relative_url }}" alt="Ricardo 3" class="dancer d3">
  <img src="{{ '/assetscss/ricardo.gif' | relative_url }}" alt="Ricardo 4" class="dancer d4">
  <img src="{{ '/assetscss/ricardo.gif' | relative_url }}" alt="Ricardo 5" class="dancer d5">

  <!-- Música de fons -->
  <audio id="bg-music" autoplay loop>
    <source src="{{ '/assetscss/music.mp3' | relative_url }}" type="audio/mpeg">
    El teu navegador no suporta àudio.
  </audio>

  <!-- Botó per controlar la música -->
  <button class="music-control" onclick="toggleMusic()">⏯ Música</button>

  <div class="container">
    <div class="content">
      {{ content }}
    </div>
  </div>

  <footer>
    <p>Contingut sota llicència Creative Commons BY-NC-SA 4.0</p>
  </footer>

  <script>
    const music = document.getElementById('bg-music');
    const btn = document.querySelector('.music-control');

    function toggleMusic() {
      if (music.paused) {
        music.play();
        btn.textContent = "⏸ Pausa Música";
      } else {
        music.pause();
        btn.textContent = "▶️ Reprodueix Música";
      }
    }
  </script>
</body>
</html>
