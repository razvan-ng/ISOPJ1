<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: 'Press Start 2P', cursive;
      margin: 0;
      padding: 0;
    }

    header {
      text-align: center;
      padding: 30px 10px;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    p.subtitle {
      font-size: 12px;
      color: #aaa;
    }

    .container {
      max-width: 900px;
      margin: 20px auto;
      padding: 20px;
      text-align: left;
      position: relative;
      z-index: 2;
    }

    .content {
      background: rgba(0,0,0,0.7);
      border-radius: 12px;
      padding: 20px;
    }

    
  </style>
</head>
<body>
  <header>
    <h1>{{ page.title | default: site.title }}</h1>
    {% if page.subtitle %}
      <p class="subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </header>

 
  <footer>
    <p>Contingut sota llicència Creative Commons BY-NC-SA 4.0</p>
  </footer>

  <script>
    // Control música
    const music = document.getElementById('bg-music');
    const btn = document.querySelector('.music-control');
    function toggleMusic() {
      if (music.paused) {
        music.play();
        btn.textContent = "⏸ Pausa Música";
      } else {
        music.pause();
        btn.textContent = "▶️ Reprodueix Música";
      }
    }

    // Reajustar quan es canvia la mida de la finestra
    window.addEventListener("resize", () => {
      dancers.forEach((d, i) => {
        positions[i].x = Math.min(positions[i].x, window.innerWidth - d.offsetWidth);
        positions[i].y = Math.min(positions[i].y, window.innerHeight - d.offsetHeight);
      });
    });
  </script>
</body>
</html>
