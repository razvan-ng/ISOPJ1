<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: 'Press Start 2P', cursive;
      margin: 0;
      padding: 0;
      overflow: hidden; /* evitar scroll per moviment */
    }

    header {
      text-align: center;
      padding: 30px 10px;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    p.subtitle {
      font-size: 12px;
      color: #aaa;
    }

    .container {
      max-width: 900px;
      margin: 20px auto;
      padding: 20px;
      text-align: left;
      position: relative;
      z-index: 2;
    }

    .content {
      background: rgba(0,0,0,0.7);
      border-radius: 12px;
      padding: 20px;
    }

    /* Ricardo flotant per la pantalla */
    .dancer {
      position: absolute;
      width: 220px;
      height: auto;
      image-rendering: pixelated;
      animation: floatX 12s linear infinite alternate,
                 floatY 8s ease-in-out infinite alternate,
                 dance 0.6s infinite alternate;
      z-index: 1;
    }

    @keyframes floatX {
      from { left: 0; }
      to   { left: calc(100% - 220px); }
    }

    @keyframes floatY {
      from { top: 0; }
      to   { top: calc(100% - 220px); }
    }

    @keyframes dance {
      from { transform: rotate(-5deg) scale(1); }
      to   { transform: rotate(5deg) scale(1.05); }
    }

    nav ul {
      list-style: none;
      padding: 0;
      margin: 30px 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    nav ul li {
      background: #222;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.5);
      transition: transform 0.2s;
    }

    nav ul li:hover {
      transform: scale(1.05);
      background: #333;
    }

    nav ul li a {
      color: #fff;
      text-decoration: none;
      font-size: 12px;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 10px;
      color: #888;
      position: relative;
      z-index: 2;
    }
  </style>
</head>
<body>
  <header>
    <h1>{{ page.title | default: site.title }}</h1>
    {% if page.subtitle %}
      <p class="subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </header>

  <!-- Ricardo ballant flotant per tota la pantalla -->
  <img src="{{ '/assetscss/ricardo.gif' | relative_url }}" alt="Ricardo ballant" class="dancer">

  <div class="container">
    <div class="content">
      {{ content }}
    </div>
  </div>

  <footer>
    <p>Contingut sota llicència Creative Commons BY-NC-SA 4.0</p>
  </footer>
</body>
</html>
