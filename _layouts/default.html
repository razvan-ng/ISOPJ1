<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: 'Press Start 2P', cursive;
      margin: 0;
      padding: 0;
      overflow: hidden; /* evitar scroll per moviment */
    }

    header {
      text-align: center;
      padding: 30px 10px;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    p.subtitle {
      font-size: 12px;
      color: #aaa;
    }

    .container {
      max-width: 900px;
      margin: 20px auto;
      padding: 20px;
      text-align: left;
      position: relative;
      z-index: 2;
    }

    .content {
      background: rgba(0,0,0,0.7);
      border-radius: 12px;
      padding: 20px;
    }

    /* Botó música */
    .music-control {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #ff0066;
      color: #fff;
      font-family: 'Press Start 2P', cursive;
      font-size: 12px;
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      z-index: 3;
      box-shadow: 0 4px 6px rgba(0,0,0,0.4);
      transition: transform 0.2s;
    }

    .music-control:hover {
      transform: scale(1.1);
      background: #ff3385;
    }

    /* Estil comú pels Ricardos */
    .dancer {
      position: absolute;
      width: 200px;
      height: auto;
      image-rendering: pixelated;
      z-index: 1;
      animation: dance 0.6s infinite alternate;
    }

    /* Animacions de flotació amb durades diferents */
    .d1 { animation: floatX1 12s linear infinite alternate,
                     floatY1 9s ease-in-out infinite alternate,
                     dance 0.6s infinite alternate; }
    .d2 { animation: floatX2 15s linear infinite alternate,
                     floatY2 11s ease-in-out infinite alternate,
                     dance 0.6s infinite alternate; }
    .d3 { animation: floatX3 18s linear infinite alternate,
                     floatY3 13s ease-in-out infinite alternate,
                     dance 0.6s infinite alternate; }
    .d4 { animation: floatX4 20s linear infinite alternate,
                     floatY4 15s ease-in-out infinite alternate,
                     dance 0.6s infinite alternate; }
    .d5 { animation: floatX5 22s linear infinite alternate,
                     floatY5 17s ease-in-out infinite alternate,
                     dance 0.6s infinite alternate; }

    @keyframes floatX1 { from { left: 0; } to { left: calc(100% - 200px); } }
    @keyframes floatY1 { from { top: 0; } to { top: calc(100% - 200px); } }

    @keyframes floatX2 { from { left: 20%; } to { left: 70%; } }
    @keyframes floatY2 { from { top: 10%; } to { top: 80%; } }

    @keyframes floatX3 { from { left: 10%; } to { left: 80%; } }
    @keyframes floatY3 { from { top: 20%; } to { top: 70%; } }

    @keyframes floatX4 { from { left: 5%; } to { left: 85%; } }
    @keyframes floatY4 { from { top: 0; } to { top: 90%; } }

    @keyframes floatX5 { from { left: 15%; } to { left: 75%; } }
    @keyframes floatY5 { from { top: 30%; } to { top: 60%; } }

    @keyframes dance {
      from { transform: rotate(-5deg) scale(1); }
      to   { transform: rotate(5deg) scale(1.05); }
    }

    nav ul {
      list-style: none;
      padding: 0;
      margin: 30px 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    nav ul li {
      background: #222;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.5);
      transition: transform 0.2s;
    }

    nav ul li:hover {
      transform: scale(1.05);
      background: #333;
    }

    nav ul li a {
      color: #fff;
      text-decoration: none;
      font-size: 12px;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 10px;
      color: #888;
      position: relative;
      z-index: 2;
    }
  </style>
</head>
<body>
  <header>
    <h1>{{ page.title | default: site.title }}</h1>
    {% if page.subtitle %}
      <p class="subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </header>

  <!-- 5 Ricardos ballant pel fons -->
  <img src="{{ '/assetscss/ricardo.gif' | relative_url }}" alt="Ricardo 1" class="dancer d1">
  <img src="{{ '/assetscss/ricardo.gif' | relative_url }}" alt="Ricardo 2" class="dancer d2">
  <img src="{{ '/assetscss/ricardo.gif' | relative_url }}" alt="Ricardo 3" class="dancer d3">
  <img src="{{ '/assetscss/ricardo.gif' | relative_url }}" alt="Ricardo 4" class="dancer d4">
  <img src="{{ '/assetscss/ricardo.gif' | relative_url }}" alt="Ricardo 5" class="dancer d5">

  <!-- Música de fons -->
  <audio id="bg-music" autoplay loop>
    <source src="{{ '/assetscss/music.mp3' | relative_url }}" type="audio/mpeg">
    El teu navegador no suporta àudio.
  </audio>

  <!-- Botó per controlar la música -->
  <button class="music-control" onclick="toggleMusic()">⏯ Música</button>

  <div class="container">
    <div class="content">
      {{ content }}
    </div>
  </div>

  <footer>
    <p>Contingut sota llicència Creative Commons BY-NC-SA 4.0</p>
  </footer>

  <script>
    const music = document.getElementById('bg-music');
    function toggleMusic() {
      if (music.paused) {
        music.play();
      } else {
        music.pause();
      }
    }
  </script>
</body>
</html>
